{% extends "base.html" %}

{% block title %}WireGuard Settings - WireGuard GUI{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-slate-900">WireGuard Settings</h1>
    <p class="text-slate-500">WireGuard interface and network settings</p>
</div>

<form action="{{ url_for('settings_wireguard') }}" method="POST" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-4xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label for="wg_interface" class="block text-sm font-medium text-slate-700">Interface</label>
            <input type="text" id="wg_interface" name="wg_interface" value="{{ settings.get('wg_interface', 'wg0') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono">
        </div>
        <div>
            <label for="wg_tunnel_name" class="block text-sm font-medium text-slate-700">Tunnel Name</label>
            <input type="text" id="wg_tunnel_name" name="wg_tunnel_name" value="{{ settings.get('wg_tunnel_name', 'wg0') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono">
        </div>
        <div>
            <label for="wg_listen_port" class="block text-sm font-medium text-slate-700">Listen Port</label>
            <input type="text" id="wg_listen_port" name="wg_listen_port" value="{{ settings.get('wg_listen_port', '51820') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
            <label for="wg_network" class="block text-sm font-medium text-slate-700">Red (CIDR)</label>
            <input type="text" id="wg_network" name="wg_network" value="{{ settings.get('wg_network', '10.0.0.0/24') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono">
        </div>
        <div>
            <label for="wg_dns" class="block text-sm font-medium text-slate-700">DNS</label>
            <input type="text" id="wg_dns" name="wg_dns" value="{{ settings.get('wg_dns', '1.1.1.1') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
            <label for="wg_allowed_ips" class="block text-sm font-medium text-slate-700">Default AllowedIPs</label>
            <input type="text" id="wg_allowed_ips" name="wg_allowed_ips" value="{{ settings.get('wg_allowed_ips', '') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono"
                placeholder="10.0.0.0/24, 192.168.1.0/24">
        </div>
        <div>
            <label for="wg_endpoint_host" class="block text-sm font-medium text-slate-700">Endpoint (Host)</label>
            <input type="text" id="wg_endpoint_host" name="wg_endpoint_host" value="{{ settings.get('wg_endpoint_host', '') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                placeholder="vpn.ejemplo.com">
        </div>
        <div>
            <label for="wg_endpoint_port" class="block text-sm font-medium text-slate-700">Endpoint (Port)</label>
            <input type="text" id="wg_endpoint_port" name="wg_endpoint_port" value="{{ settings.get('wg_endpoint_port', '51820') }}"
                class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
                placeholder="51820">
        </div>
    </div>

    <div class="mt-6">
        <label for="server_config_path" class="block text-sm font-medium text-slate-700">Configuration File Path</label>
        <input type="text" id="server_config_path" name="server_config_path" value="{{ settings.get('server_config_path', '/etc/wireguard/wg0.conf') }}"
            class="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono">
    </div>

    <div class="mt-6 flex items-center">
        <input type="checkbox" id="auto_restart_tunnel" name="auto_restart_tunnel" {% if settings.get('auto_restart_tunnel') == 'True' %}checked{% endif %}
            class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-slate-300 rounded">
        <label for="auto_restart_tunnel" class="ml-2 block text-sm text-slate-700">
            Automatically restart tunnel after changes
        </label>
    </div>

    <div class="mt-6 flex justify-end">
        <button type="submit" class="inline-flex items-center px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
            <i class="fas fa-save mr-2"></i>Save Settings
        </button>
    </div>
</form>
{% endblock %}
